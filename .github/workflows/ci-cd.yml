name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  build-and-deploy:
    name: Build, Scan & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build product-svc image
        run: |
          docker build -t product-svc:${{ github.sha }} \
            services/product-svc/

      - name: Build order-svc image
        run: |
          docker build -t order-svc:${{ github.sha }} \
            services/order-svc/

      - name: Trivy scan product-svc
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: product-svc:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Trivy scan order-svc
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: order-svc:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Push images to ECR
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag product-svc:${{ github.sha }} \
            $ECR_REGISTRY/product-svc:${{ github.sha }}
          docker tag order-svc:${{ github.sha }} \
            $ECR_REGISTRY/order-svc:${{ github.sha }}
          docker push $ECR_REGISTRY/product-svc:${{ github.sha }}
          docker push $ECR_REGISTRY/order-svc:${{ github.sha }}

      - name: Update k8s manifests with new image tag
        if: github.ref == 'refs/heads/main'
        run: |
          sed -i "s|product-svc:.*|product-svc:${{ github.sha }}|" \
            k8s/product-svc.yaml
          sed -i "s|order-svc:.*|order-svc:${{ github.sha }}|" \
            k8s/order-svc.yaml

      - name: Commit updated manifests
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add k8s/
          git diff --staged --quiet || \
            git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
