apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-svc
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-svc
  template:
    metadata:
      labels:
        app: order-svc
    spec:
      containers:
        - name: order-svc
          image: 598096478246.dkr.ecr.ap-south-1.amazonaws.com/order-svc:7433efefa3f413c1c70ceba42f1d45f494243e4d
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-svc
  namespace: ecommerce
spec:
  selector:
    app: order-svc
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
